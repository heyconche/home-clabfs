services:

  # ── Auth (SSO leve — forward_auth do Caddy) ────────────────────────────────
  auth:
    build: ./auth
    container_name: auth
    restart: unless-stopped
    env_file: .env
    volumes:
      - auth_data:/data
    networks: [clabfs]

  # ── InfraDash (custo multi-cloud) ──────────────────────────────────────────
  infradash:
    build: ./infradash
    container_name: infradash
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./infradash/credentials/gcp.json:/app/credentials/gcp.json:ro
      - ./infradash/credentials/oci.pem:/app/credentials/oci.pem:ro
    networks: [clabfs]

  # ── Dashboard (página inicial com stats) ───────────────────────────────────
  dashboard:
    image: nginx:alpine
    container_name: dashboard
    restart: unless-stopped
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
    networks: [clabfs]

  # ── Food (dieta e mercado) ─────────────────────────────────────────────────
  food:
    image: nginx:alpine
    container_name: food
    restart: unless-stopped
    volumes:
      - ./food:/usr/share/nginx/html:ro
    networks: [clabfs]

  # ── Lift (treinos de academia) ──────────────────────────────────────────────
  lift:
    image: nginx:alpine
    container_name: lift
    restart: unless-stopped
    volumes:
      - ./lift:/usr/share/nginx/html:ro
    networks: [clabfs]

  # ── Glances (API de stats do servidor) ─────────────────────────────────────
  life:
    image: nginx:alpine
    container_name: life
    restart: unless-stopped
    volumes:
      - ./life:/usr/share/nginx/html:ro
    networks: [clabfs]

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    restart: unless-stopped
    pid: host
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/nas:/mnt/nas:ro
    networks: [clabfs]

  # ── Caddy (reverse proxy + HTTPS automático) ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [clabfs]

  # ── Filebrowser (acesso web ao NAS) ────────────────────────────────────────
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    volumes:
      - /mnt/nas:/srv
      - filebrowser_db:/database
      - ./filebrowser/settings.json:/.filebrowser.json
    networks: [clabfs]

  # ── Vaultwarden (cofre de senhas) ──────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=https://cofre.conche.com.br
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - /mnt/nas/vaultwarden:/data
    networks: [clabfs]

  # ── Ghost (blog) ────────────────────────────────────────────────────────────
  ghost:
    image: ghost:5-alpine
    container_name: ghost
    restart: unless-stopped
    environment:
      - url=https://soul.conche.com.br
      - database__client=sqlite3
      - database__connection__filename=/var/lib/ghost/content/data/ghost.db
    volumes:
      - /mnt/nas/ghost:/var/lib/ghost/content
    networks: [clabfs]

  # ── Immich (fotos) ──────────────────────────────────────────────────────────
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    environment:
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    volumes:
      - /mnt/nas/immich:/usr/src/app/upload
    depends_on: [immich-db, immich-redis]
    networks: [clabfs]

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    volumes:
      - immich_model_cache:/cache
    networks: [clabfs]

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks: [clabfs]

  immich-db:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=immich
    volumes:
      - /mnt/nas/immich-db:/var/lib/postgresql/data
    networks: [clabfs]

volumes:
  caddy_data:
  caddy_config:
  immich_model_cache:
  filebrowser_db:
  auth_data:

networks:
  clabfs:
    driver: bridge
