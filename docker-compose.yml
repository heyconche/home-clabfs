services:

  # ── Caddy (reverse proxy + HTTPS automático) ────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [clabfs]

  # ── Filebrowser (acesso web tipo Google Drive) ──────────────────────────────
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    volumes:
      - /mnt/nas:/srv
      - filebrowser_db:/database
      - ./filebrowser/settings.json:/.filebrowser.json
    networks: [clabfs]

  # ── Vaultwarden (senhas) ────────────────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=https://vault.conche.com.br
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - /mnt/nas/vaultwarden:/data
    networks: [clabfs]

  # ── Ghost (blog) ────────────────────────────────────────────────────────────
  ghost:
    image: ghost:5-alpine
    container_name: ghost
    restart: unless-stopped
    environment:
      - url=https://blog.conche.com.br
      - database__client=sqlite3
      - database__connection__filename=/var/lib/ghost/content/data/ghost.db
    volumes:
      - /mnt/nas/ghost:/var/lib/ghost/content
    networks: [clabfs]

  # ── Immich (fotos) ──────────────────────────────────────────────────────────
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    environment:
      - DB_HOSTNAME=immich-db
      - DB_USERNAME=immich
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    volumes:
      - /mnt/nas/immich:/usr/src/app/upload
    depends_on: [immich-db, immich-redis]
    networks: [clabfs]

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    restart: unless-stopped
    volumes:
      - immich_model_cache:/cache
    networks: [clabfs]

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    networks: [clabfs]

  immich-db:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    container_name: immich-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=immich
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=immich
    volumes:
      - /mnt/nas/immich-db:/var/lib/postgresql/data
    networks: [clabfs]

  # ── Nextcloud ───────────────────────────────────────────────────────────────
  nextcloud:
    image: nextcloud:28-apache
    container_name: nextcloud
    restart: unless-stopped
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.conche.com.br
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - SQLITE_DATABASE=nextcloud
    volumes:
      - /mnt/nas/nextcloud:/var/www/html
    networks: [clabfs]

volumes:
  caddy_data:
  caddy_config:
  immich_model_cache:
  filebrowser_db:

networks:
  clabfs:
    driver: bridge
