[global]
   workgroup = WORKGROUP
   server string = clabfs NAS
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d
   server signing = default
   server min protocol = SMB2

[nas]
   comment = NAS Principal
   path = /mnt/nas
   browseable = yes
   read only = no
   guest ok = no
   valid users = jconche
   create mask = 0664
   directory mask = 0775
   force group = users

[public]
   comment = Compartilhado (somente leitura)
   path = /mnt/nas/public
   browseable = yes
   read only = yes
   guest ok = yes
